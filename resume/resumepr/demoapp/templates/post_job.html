{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 text-dark">➕ Post a New Job Opening</h3>
                <p class="text-muted text-center small">Fill in the details below to post a vacancy and activate AI Screening.</p>
                <hr>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Job Title</label>
                        <input type="text" class="form-control" id="title" name="title" placeholder="e.g., Python Developer, Data Analyst" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Job Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4" placeholder="Briefly describe the roles and responsibilities..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="requirements" class="form-label fw-bold">Required Skills (Comma Separated)</label>
                        <textarea class="form-control" id="requirements" name="requirements" rows="3" placeholder="e.g., Python, Django, SQL, REST API" required></textarea>
                        <div class="form-text text-muted">Note: Separate skills with commas. Our AI uses these to match with candidate resumes.</div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success py-2">Publish Job Post</button>
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary py-2">Cancel and Go Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
