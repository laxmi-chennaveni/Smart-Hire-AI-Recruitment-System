{% extends 'base.html' %}

{% block content %}
<div class="text-center mt-4">
    <p class="text-muted small">New to the platform? 
        <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Create an account (Sign Up)</a>
    </p>
</div>
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4 bg-white rounded">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold text-dark">🔐 Sign In</h3>
                <hr>
                
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Login</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">New to the platform? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-bold">Create an account</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
