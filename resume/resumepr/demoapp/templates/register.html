{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4 bg-white rounded">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold text-dark">📝 Create Your Account</h3>
                <hr>
                
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary py-2 fw-bold">Register Account</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Sign In here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
